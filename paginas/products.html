<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index</title>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="script.js" defer></script>
    <script src="https://kit.fontawesome.com/70c6f55f6a.js" crossorigin="anonymous"></script>
</head>
<body>
    <section>
        <table>
            <tr>
                <td class="img"><img src="../Imagens/Frutas/Abacate.png" alt="abacate"></td>
            </tr>
            <tr>
                <td>
                    <h1 class="title">Abacate</h1>
                </td>
            </tr>
            <tr>
                <td>
                    <div class="info">
                        <div class="price">
                            <p class="cifrao">R$ <span class="value">18,00</span></p>
                        </div>
                        <div class="desc">
                            <h3 class="peso">500 Gramas</h3>
                            <h4 class="peso-qnt">4 a 6 Und.</h4>
                        </div>
                    </div>
                </td>
            </tr>
            <tr>
                <td>
                    <div class="qnt">
                        <button class="btn-qnt">-</button>
                        <input type="text" class="input-qnt" value="1" autofocus>
                        <button class="btn-qnt">+</button>
                    </div>
                </td>
            </tr>
            <tr>
                <td>
                    <button type="submit" class="add-cart"><i class="fa-solid fa-cart-shopping"></i><span class="text">Adicionar</span></button>
                </td>
            </tr>
        </table>
    </section>
</body>
</html>
